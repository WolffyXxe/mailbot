<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailBot - Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .header h1 i { margin-right: 12px; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 20px; color: #333; font-size: 1.5rem; }
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .category-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .category-name { font-weight: bold; min-width: 120px; }
        .category-keywords { color: #666; flex: 2; }
        .logs-area {
            background: #1e1e2f;
            color: #0f0;
            font-family: monospace;
            padding: 15px;
            border-radius: 20px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-line {
            border-bottom: 1px solid #333;
            margin-bottom: 4px;
            padding-bottom: 2px;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-robot"></i> MailBot - Assistant</h1>
        <div class="user-info">
            <span><i class="fas fa-user-circle"></i> {{ username }}</span>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" data-tab="gmail">📧 Gmail</button>
        <button class="tab-btn" data-tab="categories">🏷️ Catégories</button>
        <button class="tab-btn" data-tab="actions">🎮 Actions</button>
        <button class="tab-btn" data-tab="logs">📝 Logs détaillés</button>
    </div>

    <!-- Gmail -->
    <div id="gmail" class="tab-content active">
        <div class="card">
            <h2>Configuration Gmail</h2>
            <input type="email" id="gmail_email" placeholder="Email Gmail">
            <input type="password" id="gmail_password" placeholder="Mot de passe application">
            <div class="flex-between">
                <button id="test_gmail" class="btn-success">Tester la connexion</button>
                <button id="save_gmail">Sauvegarder</button>
                <button id="get_password" class="btn-success">Obtenir mot de passe</button>
            </div>
            <div id="gmail_status" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- Catégories -->
    <div id="categories" class="tab-content">
        <div class="card">
            <h2>Gestion des catégories</h2>
            <div id="categories_list"></div>
            <div class="flex-between" style="margin-top:20px;">
                <input type="text" id="new_cat_name" placeholder="Nouvelle catégorie" style="flex:1;">
                <input type="text" id="new_cat_keywords" placeholder="Mots-clés (virgules)" style="flex:2;">
                <button id="add_cat_btn" class="btn-success">Ajouter</button>
            </div>
            <button id="save_cats" style="margin-top:15px; width:100%;">Sauvegarder</button>
        </div>
    </div>

    <!-- Actions -->
    <div id="actions" class="tab-content">
        <div class="card">
            <h2>Actions</h2>
            <div class="flex-between">
                <button id="analyze_btn" class="btn-success">Analyser (non lus)</button>
                <button id="classify_btn" class="btn-success">Classer TOUS les emails (avec logs)</button>
            </div>
            <div id="action_result" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Logs détaillés -->
    <div id="logs" class="tab-content">
        <div class="card">
            <h2>Logs d'exécution</h2>
            <div class="logs-area" id="detail_logs"></div>
            <button id="clear_detail_logs" style="margin-top:15px;">Effacer les logs</button>
        </div>
    </div>
</div>

<script>
    let logs = [];
    let currentCategories = {};
    let detailLogs = [];

    function addDetailLog(msg) {
        const time = new Date().toLocaleTimeString();
        detailLogs.unshift(`[${time}] ${msg}`);
        if (detailLogs.length > 100) detailLogs.pop();
        const container = document.getElementById('detail_logs');
        if (container) container.innerHTML = detailLogs.map(l => `<div class="log-line">${l}</div>`).join('');
        console.log(msg);
    }

    function addLog(msg) {
        addDetailLog(msg);
    }

    async function loadUserData() {
        try {
            const res = await fetch('/api/user_data');
            const data = await res.json();
            if (data.email) document.getElementById('gmail_email').value = data.email;
            if (data.categories) {
                currentCategories = data.categories;
            } else {
                currentCategories = {
                    "Voyage": ["vol", "hotel", "reservation", "voyage", "avion", "bagage", "vacances"],
                    "Pro": ["facture", "devis", "travail", "client", "mission", "boulot"],
                    "Pub": ["newsletter", "promo", "publicite", "marketing", "pub", "offre"],
                    "Perso": ["famille", "amis", "personnel", "prive", "coucou"],
                    "Shopping": ["achat", "commande", "livraison", "amazon", "ebay"],
                    "Jeux": ["jeu", "playstation", "xbox", "nintendo", "steam"]
                };
            }
            refreshCategoriesDisplay();
        } catch(e) { addLog("Erreur chargement: " + e.message); }
    }

    function refreshCategoriesDisplay() {
        const container = document.getElementById('categories_list');
        if (!container) return;
        container.innerHTML = '';
        for (const [cat, keywords] of Object.entries(currentCategories)) {
            const div = document.createElement('div');
            div.className = 'category-item';
            div.innerHTML = `
                <span class="category-name">${escapeHtml(cat)}</span>
                <span class="category-keywords">${escapeHtml(keywords.join(', '))}</span>
                <button class="del-cat" data-name="${escapeHtml(cat)}" style="background:#dc3545;">Supprimer</button>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.del-cat').forEach(btn => {
            btn.onclick = () => {
                const name = btn.dataset.name;
                delete currentCategories[name];
                refreshCategoriesDisplay();
                addLog(`Catégorie "${name}" supprimée.`);
            };
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function saveCategories() {
        try {
            const res = await fetch('/api/save_categories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({categories: currentCategories})
            });
            if (res.ok) {
                addLog("Catégories sauvegardées.");
                alert("Catégories sauvegardées !");
            } else {
                alert("Erreur sauvegarde.");
            }
        } catch(e) { addLog("Erreur réseau: " + e.message); }
    }

    function addCategory() {
        const name = document.getElementById('new_cat_name').value.trim();
        const kwRaw = document.getElementById('new_cat_keywords').value.trim();
        if (!name) { alert("Entrez un nom."); return; }
        if (currentCategories[name]) { alert("Catégorie existe déjà."); return; }
        const keywords = kwRaw ? kwRaw.split(',').map(k => k.trim()).filter(k => k) : [];
        currentCategories[name] = keywords;
        refreshCategoriesDisplay();
        document.getElementById('new_cat_name').value = '';
        document.getElementById('new_cat_keywords').value = '';
        addLog(`Catégorie "${name}" ajoutée.`);
    }

    async function testGmail() {
        const email = document.getElementById('gmail_email').value;
        const pwd = document.getElementById('gmail_password').value;
        addLog("Test de connexion Gmail...");
        const res = await fetch('/api/test_gmail', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password: pwd})
        });
        const data = await res.json();
        const div = document.getElementById('gmail_status');
        if (data.success) {
            div.innerHTML = '✅ ' + data.message;
            addLog("Test Gmail réussi");
        } else {
            div.innerHTML = '❌ ' + data.message;
            addLog("Test Gmail échoué: " + data.message);
        }
    }

    async function saveGmail() {
        const email = document.getElementById('gmail_email').value;
        const pwd = document.getElementById('gmail_password').value;
        await fetch('/api/save_gmail', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password: pwd})
        });
        addLog("Identifiants Gmail sauvegardés");
        alert("Identifiants sauvegardés");
    }

    async function analyze() {
        addLog("Analyse des emails non lus...");
        const res = await fetch('/api/analyze', {method: 'POST'});
        const data = await res.json();
        const resultDiv = document.getElementById('action_result');
        if (data.error) {
            resultDiv.innerHTML = `<span style="color:red">❌ ${data.error}</span>`;
            addLog("Erreur analyse: " + data.error);
        } else {
            resultDiv.innerHTML = `<span style="color:green">📧 ${data.count} email(s) non lu(s)</span>`;
            addLog(`${data.count} non lus`);
        }
    }

    async function classify() {
        addLog("Début du classement...");
        const resultDiv = document.getElementById('action_result');
        resultDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Classement en cours...';
        try {
            const res = await fetch('/api/classify', {method: 'POST'});
            const data = await res.json();
            if (data.error) {
                resultDiv.innerHTML = `<span style="color:red">❌ ${data.error}</span>`;
                addLog("Erreur classement: " + data.error);
                if (data.logs) {
                    for (let l of data.logs) addLog(l);
                }
            } else {
                resultDiv.innerHTML = `<span style="color:green">✅ ${data.count} email(s) classé(s) sur ${data.total}</span>`;
                addLog(`Classement terminé : ${data.count}/${data.total} emails classés.`);
                if (data.logs) {
                    for (let l of data.logs) addLog(l);
                }
            }
        } catch(e) {
            resultDiv.innerHTML = `<span style="color:red">❌ Erreur réseau : ${e.message}</span>`;
            addLog("Erreur réseau: " + e.message);
        }
    }

    document.getElementById('test_gmail').onclick = testGmail;
    document.getElementById('save_gmail').onclick = saveGmail;
    document.getElementById('get_password').onclick = () => window.open('https://myaccount.google.com/apppasswords', '_blank');
    document.getElementById('analyze_btn').onclick = analyze;
    document.getElementById('classify_btn').onclick = classify;
    document.getElementById('clear_detail_logs').onclick = () => { detailLogs = []; document.getElementById('detail_logs').innerHTML = ''; addLog("Logs effacés"); };
    document.getElementById('add_cat_btn').onclick = addCategory;
    document.getElementById('save_cats').onclick = saveCategories;

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tabId = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        };
    });

    loadUserData();
    addLog("Bot prêt. Configurez Gmail, puis lancez le classement. Les logs détaillés s'afficheront dans l'onglet 'Logs détaillés'.");
</script>
</body>
</html>
